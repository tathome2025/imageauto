<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bannerbear Layout App</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <div class="eyebrow">Minimal Bannerbear Tool</div>
        <h1>快速排版並生成 Banner</h1>
        <p class="intro">
          先在 Bannerbear 建一個 template，並將圖層命名為
          <code>car_model</code>、<code>car_brand</code>、<code>car_image</code>、
          <code>product1</code>、<code>product2</code>、<code>items1</code>、
          <code>items2</code>、<code>items3</code>，然後把 API key 與 template id
          放進 <code>.env</code> 或 Vercel 環境變數。
        </p>

        <div id="status" class="status">檢查設定中...</div>

        <form id="render-form" class="form">
          <label>
            Car Model
            <input id="title" name="title" type="text" placeholder="例如 Tesla Model 3" />
          </label>

          <label>
            Car Brand
            <input id="subtitle" name="subtitle" type="text" placeholder="例如 Tesla" />
          </label>

          <label>
            Product Item 1
            <input id="item1" name="item1" type="text" placeholder="例如 Premium Interior" />
          </label>

          <label>
            Product Item 2
            <input id="item2" name="item2" type="text" placeholder="例如 18-inch Wheels" />
          </label>

          <label>
            Product Item 3
            <input id="item3" name="item3" type="text" placeholder="例如 Autopilot Ready" />
          </label>

          <label>
            主圖
            <input id="mainImage" name="mainImage" type="file" accept="image/*" required />
          </label>

          <label>
            副圖 1
            <input id="secondaryImage1" name="secondaryImage1" type="file" accept="image/*" required />
          </label>

          <label>
            副圖 2
            <input id="secondaryImage2" name="secondaryImage2" type="file" accept="image/*" required />
          </label>

          <p class="helper">主圖對應 `car_image`，副圖 1/2 分別對應 `product1`、`product2`。</p>

          <label>
            或手動指定主圖 URL
            <input
              id="mainImageUrl"
              name="mainImageUrl"
              type="url"
              placeholder="https://images.unsplash.com/..."
            />
          </label>

          <button id="submit-button" type="submit">生成圖片</button>
        </form>
      </section>

      <section class="preview">
        <div class="preview-card">
          <div class="preview-label">結果</div>
          <div id="message" class="message">尚未生成圖片。</div>
          <img id="result-image" alt="Banner result preview" hidden />
          <a id="result-link" href="#" target="_blank" rel="noreferrer" hidden>
            在新分頁打開
          </a>
        </div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
